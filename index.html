<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leles Acessórios – Manutenção</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f3f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 600px;
      width: 100%;
      border: 1px solid #e8e3db;
    }

    .logo img {
      max-width: 100%;
      height: auto;
      max-height: 120px;
      margin-bottom: 30px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #1e2b2f;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: #c49a1f;
    }

    .icone {
      font-size: 4rem;
      color: #c49a1f;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .detalhe {
      font-size: 0.95rem;
      color: #888;
      margin-top: 20px;
      border-top: 1px solid #eee;
      padding-top: 25px;
    }

    .detalhe i {
      color: #c49a1f;
      margin: 0 4px;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .logo img {
        max-height: 80px;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <img src="LogoLeles.png" alt="Leles Acessórios Off-Road">
    </div>

    <!-- Ícone de engrenagem (opcional, apenas para charme) -->
    <div class="icone">⚙️</div>

    <!-- Título -->
    <h1>Em <span>Manutenção</span></h1>

    <!-- Mensagem -->
    <p>Estamos atualizando nosso site</p>
    <p style="font-size: 1rem; color: #777;">Voltaremos em breve com novidades!</p>

    <!-- Detalhe com contato rápido -->
    
  </div>
</body>
</html>
